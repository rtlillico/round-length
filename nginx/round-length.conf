# round-length/nginx/round-length.conf
# Copy to /etc/nginx/sites-available/round-length
# Then: ln -s /etc/nginx/sites-available/round-length /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.com;  # replace with your actual domain or IP

    # Serve the React frontend (built files)
    root /var/www/round-length/frontend/dist;
    index index.html;

    # All frontend routes — let React Router handle them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Node.js backend
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Increase timeout for long SILO downloads
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}

# HTTPS block added automatically by Certbot after you run:
# certbot --nginx -d yourdomain.com
