name: Deploy to server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 139.84.199.217
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Default command_timeout is 10m; the server's npm ci + vite build can
          # exceed that and get killed mid-build (which empties dist → site 403s).
          command_timeout: 25m
          script: |
            set -e
            cd /var/www/round-length

            echo "==> Pulling latest code"
            git pull origin master

            echo "==> Installing frontend dependencies"
            cd frontend
            npm ci

            echo "==> Building frontend (atomic — keep live dist until build succeeds)"
            # Give node more headroom and build into a temp dir, then swap into
            # place only on success. This way a failed/killed build never leaves
            # the live dist empty and the site stays up.
            export NODE_OPTIONS=--max-old-space-size=2048
            rm -rf dist-tmp
            npm run build -- --outDir dist-tmp
            rm -rf dist
            mv dist-tmp dist

            echo "==> Restarting backend"
            cd ..
            pm2 restart round-length

            echo "==> Done"
